name: Validate

# Merge gate: runs on every push and every PR, linux only.
# Branch protection on `main` requires this workflow, and auto-merge ships on
# green — so this suite is the de facto reviewer and is deliberately strict.
on:
  push:
  pull_request:

# Superseded pushes on the same ref cancel their in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# Least privilege: this merge gate only checks out and builds code.
permissions:
  contents: read

jobs:
  validate:
    name: Format, Clippy, Test & Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      # Tauri's linux system deps so `src-tauri` lints here even though the
      # devcontainer excludes it.
      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust cache
        # v3 = latest; Blacksmith's fork still targets node20 (bump when they ship node24).
        uses: useblacksmith/rust-cache@v3

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.14.1

      - name: Add cargo bin to PATH
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH

      - name: Install cargo-leptos
        # --force: useblacksmith/rust-cache (cache-bin) cleans binstall'ed
        # binaries out of the cached ~/.cargo/bin on save but keeps the
        # .crates2.json manifest, so a later cache-hit run makes binstall
        # think cargo-leptos is installed and skip it — leaving `cargo leptos`
        # missing at build time. --force always reinstalls the binary.
        run: cargo binstall -y --force cargo-leptos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The Tauri build script reads this dir; create it before any check of
      # src-tauri.
      - name: Create resource dirs for Tauri build script
        run: mkdir -p target/site/pkg

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Native workspace including src-tauri, excluding the wasm-only frontend.
      # Feature unification here builds `app` with `hosted` (from `server`) +
      # `native` (from `src-tauri`); `hosted` wins the backend cfg, so the
      # `native`-only server-fn arms are NOT covered by this line — the dedicated
      # native line below lints them (specs/data-access-backends.md).
      - name: Clippy (native workspace incl. src-tauri)
        run: cargo clippy --workspace --exclude frontend --all-targets -- -D warnings

      # The frontend crate is the cargo-leptos lib-package (cdylib) — lint it on wasm.
      - name: Clippy (frontend on wasm)
        run: cargo clippy -p frontend --target wasm32-unknown-unknown -- -D warnings

      # The `native` backend (Tauri shell: HTTPS client, no sqlx) is masked in the
      # workspace line above by `hosted` winning feature unification, so lint it
      # standalone or its arms rot ungated (it ships in the APK/.dmg).
      - name: Clippy (native backend)
        run: cargo clippy -p app --features native --all-targets -- -D warnings

      # The component bench (specs/ui-component-bench.md) is cfg'd out of every
      # release artifact, so the lines above never compile it — lint both its
      # halves (hosted server, hydrate wasm) explicitly or it rots ungated.
      # `hosted` (not bare `ssr`): a server build always carries a backend
      # (specs/data-access-backends.md), so that is the representative config.
      - name: Clippy (component bench)
        run: |
          cargo clippy -p app --features hosted,component-bench --all-targets -- -D warnings
          cargo clippy -p app --features hydrate,component-bench --target wasm32-unknown-unknown -- -D warnings

      - name: Test (native workspace, excl. frontend)
        run: cargo test --workspace --exclude frontend

      # Exercises the full Tailwind + wasm build pipeline.
      - name: Build with cargo-leptos
        run: cargo leptos build --release

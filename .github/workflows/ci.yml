name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Check, Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Add cargo bin to PATH
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH

      - name: Install cargo-generate and cargo-leptos
        run: cargo binstall -y --force cargo-generate cargo-leptos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scaffold test app
        run: cargo generate --path . --destination ${{ runner.temp }} --name test-app --silent

      - name: Check formatting
        working-directory: ${{ runner.temp }}/test-app
        run: cargo fmt --all -- --check

      - name: Create resource dirs for Tauri build script
        working-directory: ${{ runner.temp }}/test-app
        run: mkdir -p target/site/pkg

      - name: Check workspace (native)
        working-directory: ${{ runner.temp }}/test-app
        run: cargo check --workspace --exclude frontend

      - name: Check frontend (wasm)
        working-directory: ${{ runner.temp }}/test-app
        run: cargo check --package frontend --target wasm32-unknown-unknown

      - name: Clippy (native crates)
        working-directory: ${{ runner.temp }}/test-app
        run: cargo clippy --workspace --exclude frontend -- -D warnings

      - name: Clippy (frontend wasm)
        working-directory: ${{ runner.temp }}/test-app
        run: cargo clippy --package frontend --target wasm32-unknown-unknown -- -D warnings

      - name: Build with cargo-leptos
        working-directory: ${{ runner.temp }}/test-app
        run: cargo leptos build --release

  tauri-build:
    name: Tauri Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Add cargo bin to PATH
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH

      - name: Install build tools
        run: cargo binstall -y --force cargo-generate cargo-leptos tauri-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scaffold test app
        run: cargo generate --path . --destination ${{ runner.temp }} --name test-app --silent

      - name: Build Tauri app
        working-directory: ${{ runner.temp }}/test-app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
